<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仙途 · 界面优化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0a0f1e; font-family: "Noto Serif SC", "KaiTi", serif; }
        body { display: flex; justify-content: center; align-items: center; padding: 0.5rem; color: #e5d5b0; }
        
        .game-container {
            width: 100%; max-width: 500px; height: 100%; background: rgba(20, 25, 40, 0.95);
            border: 1px solid #b89b6b; border-radius: 1.5rem; padding: 0.8rem;
            display: flex; flex-direction: column; gap: 0.6rem;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        
        @keyframes breakthroughFlash {
            0% { box-shadow: 0 0 20px gold, inset 0 0 20px gold; }
            50% { box-shadow: 0 0 60px orange, inset 0 0 60px orange; }
            100% { box-shadow: 0 0 0px gold, inset 0 0 0px gold; }
        }
        .breakthrough-glow { animation: breakthroughFlash 1.5s ease-out; }
        
        /* 顶部标题栏 */
        .header { text-align: center; font-size: 1.6rem; font-weight: bold; color: #ffd78b; line-height: 1.2; }
        .player-name { text-align: center; font-size: 1.1rem; color: #fff; }
        
        /* 状态面板 - 整合修炼进度 */
        .stats-panel {
            background: #1e1a24; border-radius: 1.2rem; padding: 0.6rem 0.8rem;
            border: 1px solid #5e4e38; font-size: 0.8rem;
            display: flex; flex-wrap: wrap; justify-content: space-around; gap: 0.3rem;
        }
        .stat-item { display: flex; align-items: center; gap: 0.2rem; }
        .stat-item span:last-child { color: #ffd78b; font-weight: bold; }
        
        /* 修炼进度条 */
        .cultivate-section {
            width: 100%; display: flex; align-items: center; gap: 0.5rem; margin-top: 0.2rem;
        }
        .cultivate-label { font-size: 0.75rem; color: #b7a17c; white-space: nowrap; }
        .progress-bar {
            flex: 1; height: 8px; background: #2d2a24; border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #d4af37, #f9e076);
            width: 0%; transition: width 0.2s;
        }
        .cultivate-text { font-size: 0.7rem; color: #ffd78b; white-space: nowrap; }
        
        /* 场景切换栏 */
        .scene-bar { display: flex; background: #1e1a24; border-radius: 1.2rem; padding: 0.2rem; border: 1px solid #6b5d47; flex-shrink: 0; }
        .scene-btn {
            background: transparent; border: none; color: #b7a17c; padding: 0.5rem 0.4rem;
            border-radius: 1rem; font-weight: bold; font-size: 0.8rem; flex: 1;
            text-align: center; cursor: pointer; touch-action: manipulation;
        }
        .scene-btn.active { background: #4a3f2e; color: #ffe5a3; }
        
        /* 场景面板 - 统一高度，内部滚动 */
        .panel {
            background: #1b1e2b; border-radius: 1.2rem; padding: 0.8rem;
            border: 1px solid #6b5d47; display: none; flex-direction: column; gap: 0.5rem;
            flex: 1; min-height: 0; overflow-y: auto;
        }
        .panel.active { display: flex; }
        
        /* 按钮样式 - 手机触摸优化 */
        .btn {
            background: #2a2235; border: 1px solid #7a6a4b; color: #f3e0b0;
            padding: 0.7rem 1rem; border-radius: 1.5rem; font-weight: bold; font-size: 0.8rem;
            cursor: pointer; min-width: 55px; text-align: center; touch-action: manipulation;
        }
        .btn:active { background: #4f4233; border-color: #cfb67c; }
        .btn.primary { background: #5e4c34; border-color: #e6b55a; }
        .btn.danger { border-color: #b54a4a; color: #ffbcaf; }
        .btn:disabled { opacity: 0.5; pointer-events: none; }
        
        /* 卡片样式 */
        .card {
            background: #201c24; border-radius: 1rem; padding: 0.6rem 0.8rem;
            border: 1px solid #7d5f3f; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 0.4rem; font-size: 0.8rem;
        }
        
        /* 日志框 - 固定在底部 */
        .log-box {
            background: #0b0e14; border-radius: 0.8rem; padding: 0.5rem;
            height: 90px; flex-shrink: 0; overflow-y: auto;
            font-size: 0.75rem; color: #b9aa81; border: 1px solid #4f4532; line-height: 1.4;
        }
        
        /* 事件面板 */
        .event-panel {
            background: #2a2235; border-radius: 0.8rem; padding: 0.6rem;
            border: 1px solid #b4944c; display: none; font-size: 0.8rem;
        }
        .event-options { display: flex; gap: 0.4rem; justify-content: center; margin-top: 0.4rem; flex-wrap: wrap; }
        
        /* 弹窗 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #1e1a2b; border: 2px solid #c7a55b; border-radius: 1.5rem; padding: 1.5rem; text-align: center; min-width: 260px; }
        .modal-box h3 { color: #ffd78b; font-size: 1rem; }
        .modal-box input { padding: 0.5rem; border-radius: 1.2rem; border: 1px solid #c7a55b; background: #2a2230; color: #ffd78b; font-size: 0.9rem; text-align: center; width: 80%; margin: 0.4rem 0; }
        .gender-option { font-size: 1.1rem; cursor: pointer; padding: 0.4rem 0.8rem; border-radius: 1rem; border: 2px solid transparent; display: inline-block; margin: 0 0.4rem; }
        .gender-option.selected { border-color: #ffd700; background: rgba(255,215,0,0.2); }
        .treasure-select { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.4rem 0; }
        .treasure-item { background: #2a2235; border: 1px solid #7a6a4b; border-radius: 0.8rem; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.75rem; }
        .treasure-item.equipped { border-color: #ffd700; background: #4a3f2e; }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <!-- 标题 -->
    <div class="header" id="realmDisplay">炼气期·前期</div>
    <div class="player-name" id="playerNameDisplay">无名修士</div>
    
    <!-- 状态面板 + 修炼进度 -->
    <div class="stats-panel" id="statsPanel">
        <div class="stat-item">灵力 <span id="spiritValue">100</span>/<span id="maxSpirit">100</span></div>
        <div class="stat-item">生命 <span id="hpValue">80</span>/<span id="maxHp">80</span></div>
        <div class="stat-item">灵石 <span id="stoneValue">30</span></div>
        <div class="stat-item">攻击 <span id="attackValue">12</span></div>
        <div class="stat-item">药材 <span id="herbValue">0</span></div>
        <div class="stat-item" id="ageStat">寿元 <span id="ageValue">20</span>/<span id="maxAgeDisplay">100</span></div>
        <div class="stat-item">灵根 <span id="rootDisplay">五灵根</span></div>
        <div class="stat-item">突破率 <span id="breakRateDisplay">15%</span></div>
        <!-- 修炼进度条 -->
        <div class="cultivate-section">
            <span class="cultivate-label">修为</span>
            <div class="progress-bar"><div class="progress-fill" id="cultivateFill"></div></div>
            <span class="cultivate-text" id="progressText">0/60</span>
        </div>
    </div>
    
    <!-- 场景切换 -->
    <div class="scene-bar">
        <button class="scene-btn active" data-scene="cave">洞府</button>
        <button class="scene-btn" data-scene="sect">宗门</button>
        <button class="scene-btn" data-scene="wild">野外</button>
        <button class="scene-btn" data-scene="market">坊市</button>
        <button class="scene-btn" data-scene="secret">秘境</button>
    </div>
    
    <!-- 洞府面板 -->
    <div class="panel active" id="panelCave">
        <div style="display:flex; flex-wrap:wrap; gap:0.4rem; justify-content:center;">
            <button class="btn primary" id="cultivateBtn">修炼</button>
            <button class="btn" id="subRealmBtn">小境界</button>
            <button class="btn" id="breakthroughBtn">渡劫</button>
            <button class="btn" id="meditateBtn">吐纳</button>
            <button class="btn" id="healBtn">调息(10)</button>
            <button class="btn" id="fullHealBtn">回满(20)</button>
            <button class="btn" id="alchemyBtn">炼丹(18+2)</button>
        </div>
        <div id="masterSection">
            <div id="noMasterMsg" style="text-align:center;font-size:0.8rem;color:#7a6a8b;">暂无师尊</div>
            <div class="card" id="masterCard" style="display:none;">
                <span>师尊 <span id="masterName"></span> 恩义<span id="masterFavor">0</span></span>
                <button class="btn" id="askMasterBtn">请教(20)</button>
            </div>
        </div>
        <div id="partnerSection">
            <div id="noPartnerMsg" style="text-align:center;font-size:0.8rem;color:#7a6a8b;">暂无道侣</div>
            <div class="card" id="partnerCard" style="display:none;">
                <span>道侣 <span id="partnerName"></span> 亲密度<span id="partnerIntimacy">0</span></span>
                <button class="btn" id="dualCultivateBtn">双修</button>
                <button class="btn" id="renamePartnerBtn">改名</button>
            </div>
        </div>
        <div class="card" id="treasureCard">
            <span>法宝：<span id="currentTreasureName">无</span> 攻+<span id="currentTreasureAtk">0</span></span>
            <button class="btn" id="changeTreasureBtn">更换</button>
        </div>
        <div class="card">
            <span>功法：<span id="manualLevels">无</span></span>
            <button class="btn" id="renamePlayerBtn">改名</button>
        </div>
    </div>
    
    <!-- 宗门面板 -->
    <div class="panel" id="panelSect">
        <div id="sectInfo" style="font-size:0.9rem;">散修</div>
        <div style="font-size:0.8rem;">贡献 <span id="contribValue">0</span></div>
        <div style="display:flex; gap:0.4rem; flex-wrap:wrap;">
            <button class="btn" id="sectTaskBtn">任务</button>
            <button class="btn" id="sectSalaryBtn" disabled>俸禄(5)</button>
            <button class="btn" id="sectGuardBtn" disabled>护法(30+10)</button>
        </div>
    </div>
    
    <!-- 野外面板 -->
    <div class="panel" id="panelWild">
        <div class="card" id="monsterCard">
            <div>
                <div id="monsterName">山野妖狼</div>
                <div style="font-size:0.75rem;">生命 <span id="monsterHp">50</span> | 灵石+<span id="monsterReward">12</span></div>
            </div>
            <button class="btn danger" id="fightBtn">攻击</button>
        </div>
        <div style="display:flex; gap:0.4rem;">
            <button class="btn" id="adventureBtn">云游</button>
            <button class="btn" id="doubleAdventureBtn">云游x2</button>
        </div>
    </div>
    
    <!-- 坊市面板 -->
    <div class="panel" id="panelMarket">
        <div class="card"><span>破境丹(+10%)<span id="breakPillUsed">0</span>/3</span><button class="btn" id="buyBreakPill">30灵石</button></div>
        <div class="card"><span>回灵丹(+40灵力)</span><button class="btn" id="buySpiritPill">15灵石</button></div>
        <div class="card"><span>寿元果(寿限+8)</span><button class="btn" id="buyLifeFruit">40灵石</button></div>
        <div class="card"><span>药材x1</span><button class="btn" id="buyHerb">200灵石</button></div>
        <div class="card"><span>攻击功法</span><button class="btn" id="buyAtkManual">50灵石</button></div>
        <div class="card"><span>修炼功法</span><button class="btn" id="buySpdManual">50灵石</button></div>
        <div class="card"><span>灵力功法</span><button class="btn" id="buySpiritManual">50灵石</button></div>
        <div class="card"><span>随机法宝</span><button class="btn" id="buyTreasure">50灵石</button></div>
    </div>
    
    <!-- 秘境面板 -->
    <div class="panel" id="panelSecret">
        <div style="text-align:center;font-size:0.9rem;">秘境高风险高回报</div>
        <button class="btn danger" id="secretExploreBtn">探索秘境(20灵力)</button>
    </div>
    
    <!-- 事件面板 -->
    <div class="event-panel" id="eventPanel">
        <div id="eventDesc"></div>
        <div class="event-options" id="eventOptions"></div>
    </div>
    
    <!-- 日志框 -->
    <div class="log-box" id="logBox">> 踏入仙途...</div>
    
    <!-- 底部按钮 -->
    <div style="display:flex; justify-content:space-between; flex-shrink:0;">
        <button class="btn" id="saveBtn">保存</button>
        <button class="btn" id="resetBtn">重修</button>
    </div>
</div>
<div id="modalContainer"></div>

<script>
(function(){
    // ========== 数据定义 ==========
    const REALMS = [
        { name:"炼气期", attack:2, spiritMax:100, lifeBonus:20, hpBase:80, subCost:[60,100] },
        { name:"筑基期", attack:5, spiritMax:150, lifeBonus:120, hpBase:150, subCost:[200,320] },
        { name:"金丹期", attack:12, spiritMax:210, lifeBonus:320, hpBase:250, subCost:[500,800] },
        { name:"元婴期", attack:28, spiritMax:300, lifeBonus:720, hpBase:400, subCost:[1200,1800] },
        { name:"化神期", attack:65, spiritMax:420, lifeBonus:1420, hpBase:650, subCost:[3000,4500] },
        { name:"渡劫期", attack:150, spiritMax:580, lifeBonus:1920, hpBase:1000, subCost:[7000,10000] },
        { name:"大乘期", attack:350, spiritMax:800, lifeBonus:Infinity, hpBase:1600, subCost:[16000,24000], flyTime:1000 },
        { name:"飞升境", attack:800, spiritMax:1200, lifeBonus:Infinity, hpBase:2500, subCost:[35000,50000] }
    ];

    const ROOTS = {
        five:{name:"五灵根",mult:0.5}, four:{name:"四灵根",mult:0.6}, three:{name:"三灵根",mult:0.8},
        double:{name:"双灵根",mult:1.2}, heaven:{name:"天灵根",mult:1.5}
    };

    const TREASURES = [
        { name:"青冥剑", atk:8, spirit:0, speed:0 }, { name:"玄龟盾", atk:5, spirit:20, speed:0 },
        { name:"朱雀羽", atk:10, spirit:0, speed:0.02 }, { name:"碧玉箫", atk:4, spirit:30, speed:0.01 },
        { name:"破云梭", atk:12, spirit:0, speed:0.03 }, { name:"玲珑塔", atk:6, spirit:25, speed:0.01 },
        { name:"噬魂幡", atk:15, spirit:-10, speed:0 }, { name:"定海珠", atk:3, spirit:40, speed:0.02 },
        { name:"斩仙葫芦", atk:18, spirit:0, speed:0.01 }, { name:"风雷翅", atk:9, spirit:10, speed:0.04 }
    ];

    const MONSTER_TEMPLATES = [
        [{ name:"妖狼", hp:30, reward:12, atk:5, herb:0.7 }, { name:"毒蛇", hp:25, reward:15, atk:7, herb:0.8 }],
        [{ name:"熊精", hp:60, reward:30, atk:12, herb:0.7 }, { name:"石魔", hp:70, reward:35, atk:10, herb:0.6 }],
        [{ name:"蛇妖", hp:100, reward:55, atk:20, herb:0.7 }, { name:"金甲尸", hp:120, reward:60, atk:18, herb:0.6 }],
        [{ name:"石魔老祖", hp:180, reward:90, atk:32, herb:0.7 }, { name:"幻音女妖", hp:160, reward:85, atk:35, herb:0.8 }],
        [{ name:"鬼将", hp:280, reward:140, atk:50, herb:0.7 }, { name:"修罗", hp:320, reward:150, atk:55, herb:0.6 }],
        [{ name:"天雷邪修", hp:450, reward:220, atk:75, herb:0.7 }, { name:"九尾狐", hp:480, reward:240, atk:80, herb:0.6 }],
        [{ name:"蛟龙", hp:650, reward:350, atk:110, herb:0.7 }, { name:"凤凰", hp:700, reward:380, atk:115, herb:0.6 }],
        [{ name:"天魔", hp:1000, reward:500, atk:160, herb:0.7 }, { name:"古神残魂", hp:1100, reward:550, atk:170, herb:0.6 }]
    ];

    const DEFAULT_STATE = {
        playerName:"无名修士", gender:"male", spiritualRoot:"five",
        realmIndex:0, subRealm:0, cultivation:0,
        spirit:100, maxSpirit:100, hp:80, maxHp:80, baseAttack:10,
        stones:30, age:20, maxAge:100,
        monsters:[], monsterReward:0,
        hasMaster:false, masterName:"", masterFavor:10, attackBonusFromMaster:0,
        sectName:"", contribution:0, herb:0,
        baseBreakRate:15, breakBoost:0,
        usedGuardThisRealm:false,
        partner:null,
        treasures:[], equippedTreasureIndex:-1,
        manuals:{ atk:{level:0,bonus:0}, spd:{level:0,bonus:0}, spirit:{level:0,bonus:0} },
        flyTimeLeft:0,
        breakPillUsed:0, guardUsedTotal:0,
        logMessages:["踏入仙途..."], eventActive:false
    };

    let state = JSON.parse(JSON.stringify(DEFAULT_STATE));

    // ========== 辅助函数 ==========
    function generateMonsters() {
        const templates = MONSTER_TEMPLATES[state.realmIndex];
        const count = 1 + Math.floor(Math.random() * 2);
        const monsters = [];
        let totalReward = 0;
        for (let i = 0; i < count; i++) {
            const t = templates[Math.floor(Math.random() * templates.length)];
            monsters.push({
                name: REALMS[state.realmIndex].name + "·" + t.name,
                hp: t.hp + state.realmIndex * 3,
                maxHp: t.hp + state.realmIndex * 3,
                reward: t.reward + state.realmIndex * 2,
                attack: t.atk + state.realmIndex,
                herbChance: t.herb
            });
            totalReward += t.reward + state.realmIndex * 2;
        }
        state.monsters = monsters;
        state.monsterReward = totalReward;
        updateMonsterUI();
    }

    function updateMonsterUI() {
        if (!state.monsters || state.monsters.length === 0) {
            document.getElementById('monsterName').textContent = '无';
            document.getElementById('monsterHp').textContent = '0';
            document.getElementById('monsterReward').textContent = '0';
            return;
        }
        const names = state.monsters.map(m => m.name).join('、');
        const totalHp = state.monsters.reduce((s,m) => s + m.hp, 0);
        document.getElementById('monsterName').textContent = names;
        document.getElementById('monsterHp').textContent = totalHp;
        document.getElementById('monsterReward').textContent = state.monsterReward;
    }

    function recalcStats() {
        const realm = REALMS[state.realmIndex];
        const baseAtk = 10 + Math.floor(realm.attack * (1 + state.subRealm * 0.25));
        let atk = baseAtk + state.attackBonusFromMaster;
        if (state.partner) atk += state.partner.attackBonus;
        const equipped = getEquippedTreasure();
        if (equipped) atk += equipped.atk;
        atk += state.manuals.atk.bonus;
        state.baseAttack = Math.floor(atk);
        state.maxSpirit = realm.spiritMax + (equipped ? equipped.spirit : 0) + state.manuals.spirit.bonus;
        state.maxAge = isFinite(realm.lifeBonus) ? 80 + realm.lifeBonus : Infinity;
        state.maxHp = Math.floor(realm.hpBase * (1 + state.subRealm * 0.12));
        if (state.spirit > state.maxSpirit) state.spirit = state.maxSpirit;
        if (state.hp > state.maxHp) state.hp = state.maxHp;
        if (!isFinite(state.maxAge)) { state.age = Math.min(state.age, state.maxAge); }
        else if (state.age > state.maxAge) { state.age = state.maxAge; }
    }

    function getEquippedTreasure() {
        if (state.equippedTreasureIndex >= 0 && state.equippedTreasureIndex < state.treasures.length)
            return state.treasures[state.equippedTreasureIndex];
        return null;
    }

    function getSubRealmCost() { return state.subRealm >= 2 ? Infinity : REALMS[state.realmIndex].subCost[state.subRealm]; }
    function getBreakNeed() { return Math.floor(200 * Math.pow(1.5, state.realmIndex) + state.realmIndex * 100); }
    function getCurrentMaxCultivation() { return state.subRealm < 2 ? getSubRealmCost() : getBreakNeed(); }
    function getTotalBreakRate() { return Math.min(100, state.baseBreakRate + state.breakBoost); }

    function addLog(msg) {
        state.logMessages.push(msg);
        if (state.logMessages.length > 12) state.logMessages.shift();
        updateUI();
    }

    function consumeYears(y) {
        if (state.realmIndex === 6) {
            state.flyTimeLeft = Math.max(0, state.flyTimeLeft - y);
            if (state.flyTimeLeft <= 0) { addLog("飞升时限已至，轮回重修。"); resetGame(true); return false; }
            return true;
        }
        state.age += y;
        if (state.age >= state.maxAge) { addLog("寿元耗尽，轮回重修。"); resetGame(true); return false; }
        return true;
    }

    function reduceMaxAge(y) {
        if (state.realmIndex >= 6) {
            state.flyTimeLeft = Math.max(0, state.flyTimeLeft - y);
            if (state.flyTimeLeft <= 0) { addLog("飞升时限耗尽，轮回重修。"); resetGame(true); }
            return;
        }
        if (!isFinite(state.maxAge)) return;
        state.maxAge = Math.max(state.age, state.maxAge - y);
        if (state.age >= state.maxAge) { addLog("寿元枯竭，轮回重修。"); resetGame(true); }
    }

    function agePenalty() { return Math.max(0.3, 1 - (state.age - 20) * 0.006); }
    function getCultivateMultiplier() {
        let mul = 1;
        const equipped = getEquippedTreasure();
        if (equipped && equipped.speed) mul += equipped.speed;
        mul += state.manuals.spd.bonus / 100;
        if (state.partner) mul += state.partner.speedBonus || 0;
        mul *= ROOTS[state.spiritualRoot].mult;
        mul *= agePenalty();
        return mul;
    }
    function getBaseCultivateGain() {
        return Math.floor((4 + state.realmIndex * 2.5) * (0.8 + Math.random() * 0.4) * getCultivateMultiplier());
    }

    // ========== 弹窗 ==========
    function showModal(html) {
        hideModal();
        const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
        const box = document.createElement('div'); box.className = 'modal-box'; box.innerHTML = html;
        overlay.appendChild(box);
        document.getElementById('modalContainer').appendChild(overlay);
    }
    function hideModal() { document.getElementById('modalContainer').innerHTML = ''; }

    function startNewGame() {
        showModal(`
            <h3>选择性别</h3>
            <div><span class="gender-option" data-gender="male">男</span><span class="gender-option" data-gender="female">女</span></div>
            <button class="btn" id="confirmGenderBtn" disabled>确定</button>
        `);
        let sel = null;
        document.querySelectorAll('.gender-option').forEach(o => {
            o.addEventListener('click', ()=>{
                document.querySelectorAll('.gender-option').forEach(x=>x.classList.remove('selected'));
                o.classList.add('selected');
                sel = o.dataset.gender;
                document.getElementById('confirmGenderBtn').disabled = false;
            });
        });
        document.getElementById('confirmGenderBtn').addEventListener('click', ()=>{
            state.gender = sel;
            hideModal();
            showModal(`
                <h3>道号</h3>
                <input type="text" id="nameInput" value="无名修士" maxlength="8">
                <br><button class="btn" id="confirmNameBtn">踏入仙途</button>
            `);
            document.getElementById('confirmNameBtn').addEventListener('click', ()=>{
                state.playerName = document.getElementById('nameInput').value.trim() || '无名修士';
                state.spiritualRoot = Object.keys(ROOTS)[Math.floor(Math.random()*5)];
                state.baseBreakRate = 5 + Math.floor(Math.random()*16);
                state.realmIndex = 0; state.subRealm = 0; state.cultivation = 0;
                state.age = 20; state.maxAge = 100; state.hp = 80;
                hideModal();
                generateMonsters(); recalcStats(); state.hp = state.maxHp;
                updateUI(); saveGame();
            });
        });
    }

    function createPartner() {
        if (state.partner) return;
        const names = ["紫霞仙子","白素贞","柳梦璃","云韵","彩蝶"];
        const def = names[Math.floor(Math.random()*names.length)];
        showModal(`<h3>结为道侣</h3><input type="text" id="pName" value="${def}" maxlength="8"><br><button class="btn" id="confirmPartnerBtn">确定</button>`);
        document.getElementById('confirmPartnerBtn').addEventListener('click', ()=>{
            const name = document.getElementById('pName').value.trim() || def;
            state.partner = { name, intimacy:20, attackBonus:3+state.realmIndex*2, speedBonus:0.05+state.realmIndex*0.02 };
            hideModal(); recalcStats(); addLog(`结识道侣【${name}】`); updateUI(); saveGame();
        });
    }

    function triggerBreakthroughEffect() {
        const c = document.getElementById('gameContainer'); c.classList.add('breakthrough-glow');
        setTimeout(()=>c.classList.remove('breakthrough-glow'),1500);
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;color:gold;font-weight:bold;z-index:999';
        t.textContent = '突破！';
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),1500);
    }

    function hpDeathPenalty() {
        addLog("重伤昏迷！修为损失10%，寿元上限减少5年");
        state.cultivation = Math.floor(state.cultivation * 0.9);
        reduceMaxAge(5);
        state.hp = state.maxHp;
    }

    function addTreasure(t) {
        state.treasures.push({...t});
        addLog(`获得法宝【${t.name}】`);
        if (state.equippedTreasureIndex === -1) { state.equippedTreasureIndex = state.treasures.length - 1; addLog(`自动装备【${t.name}】`); }
        recalcStats(); updateUI(); saveGame();
    }

    function showTreasureSelect() {
        if (!state.treasures.length) { addLog("没有任何法宝"); return; }
        showModal(`<h3>选择法宝</h3><div class="treasure-select" id="treasureList"></div><button class="btn" id="confirmTreasureBtn">关闭</button>`);
        const list = document.getElementById('treasureList');
        state.treasures.forEach((t,i)=>{
            const item = document.createElement('div');
            item.className = 'treasure-item' + (i===state.equippedTreasureIndex?' equipped':'');
            item.textContent = `${t.name} (攻+${t.atk})`;
            item.addEventListener('click', ()=>{
                state.equippedTreasureIndex = i; recalcStats(); updateUI(); saveGame(); hideModal();
                addLog(`装备法宝【${t.name}】`);
            });
            list.appendChild(item);
        });
        document.getElementById('confirmTreasureBtn').addEventListener('click', hideModal);
    }

    function triggerEvent(type) {
        state.eventActive = true;
        const pool = eventPool[type] || eventPool.cultivate;
        const ev = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('eventDesc').textContent = ev.desc;
        const optDiv = document.getElementById('eventOptions'); optDiv.innerHTML = '';
        ev.opts.forEach(o => {
            const btn = document.createElement('button'); btn.className = 'btn'; btn.textContent = o.text;
            btn.addEventListener('click', () => { o.action(); endEvent(); });
            optDiv.appendChild(btn);
        });
        document.getElementById('eventPanel').style.display = 'block';
    }

    function endEvent() { state.eventActive = false; document.getElementById('eventPanel').style.display = 'none'; updateUI(); }

    // ========== 核心操作 ==========
    function cultivate() {
        if (state.spirit < 5) { addLog("灵力不足"); return; }
        const maxCul = getCurrentMaxCultivation();
        if (state.cultivation >= maxCul) { addLog("修为已满，请突破境界"); return; }
        state.spirit -= 4;
        let gain = getBaseCultivateGain();
        state.cultivation = Math.min(state.cultivation + gain, maxCul);
        state.hp = Math.min(state.maxHp, state.hp + Math.floor(state.maxHp * 0.03));
        if (!consumeYears(0.5)) return;
        addLog(`修炼 +${gain}修为`);
        if (Math.random() < 0.2) triggerEvent('cultivate');
        if (Math.random() < 0.1 && !state.partner) createPartner();
        updateUI();
    }

    function subRealmBreak() {
        if (state.subRealm >= 2) { addLog("已是后期，需渡劫突破大境界"); return; }
        const cost = getSubRealmCost();
        if (state.cultivation < cost) { addLog(`需要${cost}修为突破小境界`); return; }
        state.cultivation -= cost; state.subRealm++;
        recalcStats(); state.hp = state.maxHp;
        addLog(`突破至${REALMS[state.realmIndex].name}·${['前期','中期','后期'][state.subRealm]}，攻击提升至${state.baseAttack}`);
        updateUI();
    }

    function breakthrough() {
        if (state.subRealm < 2) { addLog("需达到后期方可渡劫大境界"); return; }
        if (state.realmIndex >= REALMS.length-1) { addLog("已达飞升境"); return; }
        const needed = getBreakNeed();
        if (state.cultivation < needed) { addLog(`需要${needed}修为引动天劫`); return; }
        state.cultivation -= needed;
        const success = Math.random() * 100 < getTotalBreakRate();
        state.breakBoost = 0;
        if (success) {
            state.realmIndex++; state.subRealm = 0;
            state.usedGuardThisRealm = false;
            state.breakPillUsed = 0; state.guardUsedTotal = 0;
            if (state.realmIndex === 6) state.flyTimeLeft = 1000;
            state.baseBreakRate = 5 + Math.floor(Math.random() * 16);
            recalcStats(); state.hp = state.maxHp;
            addLog(`渡劫成功！踏入${REALMS[state.realmIndex].name}·前期，攻击暴涨至${state.baseAttack}`);
            triggerBreakthroughEffect();
            state.cultivation = Math.floor(state.cultivation * 0.1);
            state.spirit = state.maxSpirit;
            generateMonsters();
            if (state.hasMaster) { state.masterFavor += 5; addLog("师尊欣慰"); }
            if (!state.partner && Math.random() < 0.4) createPartner();
        } else {
            reduceMaxAge(10);
            state.spirit = Math.floor(state.spirit * 0.5);
            state.cultivation = Math.floor(state.cultivation * 0.4);
            state.hp = Math.floor(state.hp * 0.5);
            addLog("渡劫失败！寿元上限-10，灵力与生命大损");
        }
        if (!consumeYears(0.8)) return;
        updateUI();
    }

    function meditate() {
        let rec = 5+Math.floor(Math.random()*10);
        state.spirit = Math.min(state.maxSpirit, state.spirit+rec);
        state.hp = Math.min(state.maxHp, state.hp+Math.floor(state.maxHp*0.05));
        addLog(`吐纳恢复灵力+${rec}`); consumeYears(0.1); updateUI();
    }

    function heal() {
        if (state.stones < 10) { addLog("灵石不足"); return; }
        state.stones -= 10;
        state.spirit = Math.min(state.maxSpirit, state.spirit+Math.floor(state.maxSpirit*0.4+15));
        state.hp = Math.min(state.maxHp, state.hp+Math.floor(state.maxHp*0.3));
        addLog("调息恢复"); consumeYears(0.2); updateUI();
    }

    function fullHeal() {
        if (state.stones < 20) { addLog("灵石不足"); return; }
        state.stones -= 20; state.spirit = state.maxSpirit; state.hp = state.maxHp;
        addLog("回满灵力与生命"); consumeYears(0.7); updateUI();
    }

    function alchemy() {
        if (state.stones < 18 || state.herb < 2) { addLog("需18灵石+2药材"); return; }
        const maxCul = getCurrentMaxCultivation();
        if (state.cultivation >= maxCul) { addLog("修为已满，请突破境界"); return; }
        state.stones -= 18; state.herb -= 2;
        if (Math.random() < 0.85) {
            let gain = Math.floor((45 + state.realmIndex * 15) * (0.9+Math.random()*0.2));
            state.cultivation = Math.min(state.cultivation + gain, maxCul);
            addLog(`炼丹成功，修为+${gain}`);
        } else addLog("丹炉炸裂");
        consumeYears(0.4); updateUI();
    }

    function dualCultivate() {
        if (!state.partner) { addLog("没有道侣"); return; }
        if (state.spirit < 15) { addLog("灵力不足"); return; }
        const maxCul = getCurrentMaxCultivation();
        if (state.cultivation >= maxCul) { addLog("修为已满，请突破境界"); return; }
        state.spirit -= 15;
        let base = getBaseCultivateGain(), mult = 1.5+Math.random()*0.7;
        let gain = Math.floor(base * mult);
        state.cultivation = Math.min(state.cultivation + gain, maxCul);
        state.partner.intimacy += 5;
        state.hp = Math.min(state.maxHp, state.hp+Math.floor(state.maxHp*0.1));
        addLog(`双修 +${gain}修为 (${Math.floor(mult*100)}%效率)`);
        if (state.partner.intimacy >= 100 && state.partner.attackBonus < 25) {
            state.partner.attackBonus += 5; recalcStats(); addLog("道侣突破，攻击+5");
        }
        if (Math.random() < 0.15) triggerEvent('dual');
        consumeYears(1.0); updateUI();
    }

    function askMaster() {
        if (!state.hasMaster) { addLog("无师尊"); return; }
        if (state.stones < 20) { addLog("灵石不足"); return; }
        const maxCul = getCurrentMaxCultivation();
        if (state.cultivation >= maxCul) { addLog("修为已满，请突破境界"); return; }
        state.stones -= 20;
        let base = getBaseCultivateGain(), mult = 1.4+Math.random()*0.6;
        let gain = Math.floor(base * mult);
        state.cultivation = Math.min(state.cultivation + gain, maxCul);
        state.masterFavor += 2;
        addLog(`请教 +${gain}修为 (${Math.floor(mult*100)}%效率)`);
        if (Math.random() < 0.15) triggerEvent('master');
        consumeYears(0.5); updateUI();
    }

    function sectTask() {
        if (!state.sectName) { addLog("无宗门"); return; }
        if (state.spirit < 10) { addLog("灵力不足"); return; }
        state.spirit -= 10;
        if (Math.random() < 0.5) { state.contribution+=2+Math.floor(Math.random()*4); state.stones+=5+state.realmIndex*3; addLog("任务完成"); }
        else if (Math.random() < 0.8) { state.contribution+=3; addLog("普通任务"); }
        else { triggerEvent('sect'); return; }
        consumeYears(0.3); updateUI();
    }

    function sectSalary() {
        if (state.contribution < 5) { addLog("贡献不足"); return; }
        state.contribution -= 5; state.stones += 15+state.realmIndex*6; addLog("领取俸禄"); updateUI();
    }

    function sectGuard() {
        if (!state.sectName||state.guardUsedTotal>=1||state.stones<30||state.contribution<10) return;
        state.stones-=30; state.contribution-=10; state.guardUsedTotal=1;
        state.breakBoost+=10; addLog("护法加持，突破率+10%"); updateUI();
    }

    function attackMonster() {
        if (!state.monsters.length) { generateMonsters(); return; }
        if (state.spirit < 3) { addLog("灵力不足"); return; }
        state.spirit -= 3;
        let dmg = Math.floor(state.baseAttack*(0.9+Math.random()*0.5));
        const target = state.monsters[Math.floor(Math.random()*state.monsters.length)];
        target.hp -= dmg; addLog(`攻击${target.name}，造成${dmg}伤害`);
        if (target.hp <= 0) {
            state.stones += target.reward;
            if (Math.random() < target.herbChance) state.herb++;
            addLog(`击杀${target.name}，灵石+${target.reward}`);
            state.monsters.splice(state.monsters.indexOf(target), 1);
        }
        if (state.monsters.length) {
            const atker = state.monsters[Math.floor(Math.random()*state.monsters.length)];
            state.hp = Math.max(0, state.hp - Math.floor(atker.attack*(0.7+Math.random()*0.5)));
            if (state.hp <= 0) hpDeathPenalty();
        }
        if (!state.monsters.length) generateMonsters();
        updateMonsterUI(); updateUI();
    }

    function adventure(double=false) {
        if (state.eventActive) return;
        let cost = double?15:8;
        if (state.spirit < cost) { addLog("灵力不足"); return; }
        state.spirit -= cost;
        let logs = [];
        for (let i=0;i<(double?2:1);i++) {
            let r = Math.random();
            if (r<0.3 && !state.hasMaster) {
                const masters=["青云真人","酒剑仙","丹霞长老"];
                state.hasMaster=true; state.masterName=masters[Math.floor(Math.random()*masters.length)];
                state.attackBonusFromMaster=4+state.realmIndex*3; recalcStats();
                logs.push(`拜师【${state.masterName}】`);
            } else if (r<0.55 && !state.sectName) {
                const sects=["玄天宗","万剑门","碧落宫"];
                state.sectName=sects[Math.floor(Math.random()*sects.length)];
                state.stones+=25+state.realmIndex*10; logs.push(`加入${state.sectName}`);
            } else if (r<0.75) {
                let s=15+state.realmIndex*8, c=6+state.realmIndex*3;
                state.stones+=s; state.cultivation=Math.min(state.cultivation+c,getCurrentMaxCultivation());
                if (Math.random()<0.4) state.herb++; logs.push(`灵石+${s}，修为+${c}`);
            } else if (r<0.9) { let s=20+state.realmIndex*10; state.stones+=s; logs.push(`灵石+${s}`); }
            else {
                let loss=10+Math.floor(Math.random()*15);
                state.spirit=Math.max(0,state.spirit-loss); state.hp=Math.max(0,state.hp-Math.floor(loss*1.5));
                logs.push(`遇险，灵力-${loss}`); if(state.hp<=0) hpDeathPenalty();
            }
            if (!state.partner && Math.random()<0.2) createPartner();
        }
        if (logs.length) addLog(`云游：${logs.join('；')}`);
        if (!double && Math.random()<0.35) triggerEvent('wild');
        recalcStats(); if (!consumeYears(double?0.8:0.5)) return;
        updateUI();
    }

    function secretExplore() {
        if (state.spirit < 20) { addLog("灵力不足"); return; }
        state.spirit -= 20;
        let r = Math.random();
        if (r<0.2) { triggerEvent('secret'); return; }
        else if (r<0.4) { let s=40+state.realmIndex*15; state.stones+=s; addLog(`秘境灵石+${s}`); }
        else if (r<0.6) { let g=25+state.realmIndex*10; state.cultivation=Math.min(state.cultivation+g,getCurrentMaxCultivation()); addLog(`秘境悟道，修为+${g}`); }
        else if (r<0.8) { const t=TREASURES[Math.floor(Math.random()*TREASURES.length)]; addTreasure(t); }
        else if (r<0.95) { state.herb+=3; addLog("药材+3"); }
        else { state.hp=Math.max(0,state.hp-30); reduceMaxAge(5); addLog("秘境遇险，寿限-5"); if(state.hp<=0) hpDeathPenalty(); }
        if (!state.partner && Math.random()<0.2) createPartner();
        if (!consumeYears(1.2)) return;
        updateUI();
    }

    // ========== 坊市 ==========
    function buyBreakPill(){ if(state.stones<30||state.breakPillUsed>=3) return; state.stones-=30; state.breakPillUsed++; state.breakBoost=Math.min(50,state.breakBoost+10); addLog("破境丹，突破率+10%"); updateUI(); }
    function buySpiritPill(){ if(state.stones<15) return; state.stones-=15; state.spirit=Math.min(state.maxSpirit,state.spirit+40); addLog("回灵丹"); updateUI(); }
    function buyLifeFruit(){ if(state.stones<40) return; state.stones-=40; state.maxAge+=8; addLog("寿元果，寿限+8"); updateUI(); }
    function buyHerb(){ if(state.stones<200) return; state.stones-=200; state.herb++; addLog("药材+1"); updateUI(); }
    function buyAtkManual(){ if(state.stones<50) return; state.stones-=50; let a=2+Math.floor(Math.random()*5); state.manuals.atk.level++; state.manuals.atk.bonus+=a; recalcStats(); addLog(`攻击功法+${a}`); updateUI(); }
    function buySpdManual(){ if(state.stones<50) return; state.stones-=50; let a=2+Math.floor(Math.random()*4); state.manuals.spd.level++; state.manuals.spd.bonus+=a; recalcStats(); addLog(`修炼功法+${a}%`); updateUI(); }
    function buySpiritManual(){ if(state.stones<50) return; state.stones-=50; let a=5+Math.floor(Math.random()*8); state.manuals.spirit.level++; state.manuals.spirit.bonus+=a; recalcStats(); addLog(`灵力功法+${a}`); updateUI(); }
    function buyTreasure(){ if(state.stones<50) return; state.stones-=50; const t=TREASURES[Math.floor(Math.random()*TREASURES.length)]; addTreasure(t); }

    function renamePlayer() {
        showModal(`<h3>修改道号</h3><input type="text" id="renameInput" value="${state.playerName}" maxlength="8"><br><button class="btn" id="confirmRenameBtn">确定</button>`);
        document.getElementById('confirmRenameBtn').onclick = ()=>{ const n=document.getElementById('renameInput').value.trim(); if(n){ state.playerName=n; addLog(`道号更改为【${n}】`); } hideModal(); updateUI(); saveGame(); };
    }
    function renamePartner() {
        if(!state.partner) return;
        showModal(`<h3>道侣改名</h3><input type="text" id="renamePartnerInput" value="${state.partner.name}" maxlength="8"><br><button class="btn" id="confirmRenamePartnerBtn">确定</button>`);
        document.getElementById('confirmRenamePartnerBtn').onclick = ()=>{ const n=document.getElementById('renamePartnerInput').value.trim(); if(n){ state.partner.name=n; addLog(`道侣更名为【${n}】`); } hideModal(); updateUI(); saveGame(); };
    }

    function resetGame(silent=false) {
        if(!silent && !confirm('确定重修？')) return;
        state = JSON.parse(JSON.stringify(DEFAULT_STATE));
        state.spiritualRoot = Object.keys(ROOTS)[Math.floor(Math.random()*5)];
        state.baseBreakRate = 5 + Math.floor(Math.random()*16);
        generateMonsters(); recalcStats(); state.hp = state.maxHp;
        addLog(silent?"寿元耗尽，轮回重修。":"重修，道心弥坚。");
        updateUI(); saveGame();
    }

    function switchScene(scene) {
        document.querySelectorAll('.scene-btn').forEach(b=>b.classList.remove('active'));
        document.querySelector(`.scene-btn[data-scene="${scene}"]`).classList.add('active');
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        document.getElementById('panel'+scene.charAt(0).toUpperCase()+scene.slice(1)).classList.add('active');
        document.getElementById('eventPanel').style.display = 'none';
        state.eventActive = false;
    }

    function saveGame() { try{ localStorage.setItem('xiuxian_v7', JSON.stringify(state)); } catch(e){} }
    function loadGame() {
        try {
            const s = localStorage.getItem('xiuxian_v7');
            if(s) {
                state = JSON.parse(s);
                if(!state.treasures) state.treasures=[];
                if(state.equippedTreasureIndex===undefined) state.equippedTreasureIndex=-1;
                if(!state.manuals?.atk) state.manuals={atk:{level:0,bonus:0},spd:{level:0,bonus:0},spirit:{level:0,bonus:0}};
                if(state.baseBreakRate===undefined) state.baseBreakRate=15;
                if(state.breakPillUsed===undefined) state.breakPillUsed=0;
                if(state.guardUsedTotal===undefined) state.guardUsedTotal=0;
                if(!state.gender) state.gender='male';
                if(state.realmIndex<0||state.realmIndex>=REALMS.length) { state.realmIndex=0; state.subRealm=0; }
                if(!state.monsters?.length) generateMonsters();
                recalcStats();
                if(state.hp>state.maxHp) state.hp=state.maxHp;
                addLog("读档成功");
            } else { startNewGame(); return; }
        } catch(e) { startNewGame(); return; }
        updateUI();
    }

    function updateUI() {
        document.getElementById('realmDisplay').textContent = `${REALMS[state.realmIndex].name}·${['前期','中期','后期'][state.subRealm]}`;
        document.getElementById('playerNameDisplay').textContent = state.playerName;
        document.getElementById('spiritValue').textContent = Math.floor(state.spirit);
        document.getElementById('maxSpirit').textContent = state.maxSpirit;
        document.getElementById('hpValue').textContent = Math.floor(state.hp);
        document.getElementById('maxHp').textContent = state.maxHp;
        document.getElementById('stoneValue').textContent = state.stones;
        document.getElementById('attackValue').textContent = state.baseAttack;
        document.getElementById('herbValue').textContent = state.herb;
        document.getElementById('rootDisplay').textContent = ROOTS[state.spiritualRoot].name;
        document.getElementById('breakRateDisplay').textContent = getTotalBreakRate()+'%';
        document.getElementById('contribValue').textContent = state.contribution;
        document.getElementById('sectInfo').textContent = state.sectName ? `${state.sectName}弟子` : '散修';
        
        const ageStat = document.getElementById('ageStat');
        if (state.realmIndex >= 6) {
            ageStat.innerHTML = '寿元 <span>无尽</span>';
            if (state.realmIndex === 6) ageStat.innerHTML += ` 飞升<span>${Math.floor(state.flyTimeLeft)}</span>年`;
        } else {
            document.getElementById('ageValue').textContent = Math.floor(state.age);
            document.getElementById('maxAgeDisplay').textContent = isFinite(state.maxAge)?state.maxAge:'∞';
        }
        
        document.getElementById('breakPillUsed').textContent = state.breakPillUsed;
        document.getElementById('sectGuardBtn').disabled = !state.sectName||state.guardUsedTotal>=1||state.stones<30||state.contribution<10;
        document.getElementById('sectSalaryBtn').disabled = state.contribution<5;
        
        const needed = getCurrentMaxCultivation();
        document.getElementById('progressText').textContent = `${state.cultivation}/${needed}`;
        document.getElementById('cultivateFill').style.width = Math.min(100,(state.cultivation/needed)*100)+'%';
        
        if(state.hasMaster){
            document.getElementById('masterCard').style.display='flex'; document.getElementById('noMasterMsg').style.display='none';
            document.getElementById('masterName').textContent=state.masterName; document.getElementById('masterFavor').textContent=state.masterFavor;
        } else { document.getElementById('masterCard').style.display='none'; document.getElementById('noMasterMsg').style.display='block'; }
        if(state.partner){
            document.getElementById('partnerCard').style.display='flex'; document.getElementById('noPartnerMsg').style.display='none';
            document.getElementById('partnerName').textContent=state.partner.name; document.getElementById('partnerIntimacy').textContent=state.partner.intimacy;
        } else { document.getElementById('partnerCard').style.display='none'; document.getElementById('noPartnerMsg').style.display='block'; }
        
        const eq = getEquippedTreasure();
        document.getElementById('currentTreasureName').textContent = eq?eq.name:'无';
        document.getElementById('currentTreasureAtk').textContent = eq?eq.atk:0;
        
        const m = state.manuals, parts=[];
        if(m.atk.level>0) parts.push(`攻${m.atk.level}级(+${m.atk.bonus})`);
        if(m.spd.level>0) parts.push(`速${m.spd.level}级(+${m.spd.bonus}%)`);
        if(m.spirit.level>0) parts.push(`灵${m.spirit.level}级(+${m.spirit.bonus})`);
        document.getElementById('manualLevels').textContent = parts.length?parts.join(' '):'无';
        document.getElementById('logBox').innerHTML = state.logMessages.slice(-6).map(m=>'> '+m).join('<br>');
    }

    function bindEvents() {
        document.getElementById('cultivateBtn').onclick = ()=>{ cultivate(); saveGame(); };
        document.getElementById('subRealmBtn').onclick = ()=>{ subRealmBreak(); saveGame(); };
        document.getElementById('breakthroughBtn').onclick = ()=>{ breakthrough(); saveGame(); };
        document.getElementById('meditateBtn').onclick = ()=>{ meditate(); saveGame(); };
        document.getElementById('healBtn').onclick = ()=>{ heal(); saveGame(); };
        document.getElementById('fullHealBtn').onclick = ()=>{ fullHeal(); saveGame(); };
        document.getElementById('alchemyBtn').onclick = ()=>{ alchemy(); saveGame(); };
        document.getElementById('dualCultivateBtn').onclick = ()=>{ dualCultivate(); saveGame(); };
        document.getElementById('askMasterBtn').onclick = ()=>{ askMaster(); saveGame(); };
        document.getElementById('sectTaskBtn').onclick = ()=>{ sectTask(); saveGame(); };
        document.getElementById('sectSalaryBtn').onclick = ()=>{ sectSalary(); saveGame(); };
        document.getElementById('sectGuardBtn').onclick = ()=>{ sectGuard(); saveGame(); };
        document.getElementById('fightBtn').onclick = ()=>{ attackMonster(); saveGame(); };
        document.getElementById('adventureBtn').onclick = ()=>{ adventure(false); saveGame(); };
        document.getElementById('doubleAdventureBtn').onclick = ()=>{ adventure(true); saveGame(); };
        document.getElementById('secretExploreBtn').onclick = ()=>{ secretExplore(); saveGame(); };
        document.getElementById('buyBreakPill').onclick = ()=>{ buyBreakPill(); saveGame(); };
        document.getElementById('buySpiritPill').onclick = ()=>{ buySpiritPill(); saveGame(); };
        document.getElementById('buyLifeFruit').onclick = ()=>{ buyLifeFruit(); saveGame(); };
        document.getElementById('buyHerb').onclick = ()=>{ buyHerb(); saveGame(); };
        document.getElementById('buyAtkManual').onclick = ()=>{ buyAtkManual(); saveGame(); };
        document.getElementById('buySpdManual').onclick = ()=>{ buySpdManual(); saveGame(); };
        document.getElementById('buySpiritManual').onclick = ()=>{ buySpiritManual(); saveGame(); };
        document.getElementById('buyTreasure').onclick = ()=>{ buyTreasure(); saveGame(); };
        document.getElementById('changeTreasureBtn').onclick = showTreasureSelect;
        document.getElementById('renamePlayerBtn').onclick = renamePlayer;
        document.getElementById('renamePartnerBtn').onclick = renamePartner;
        document.getElementById('saveBtn').onclick = saveGame;
        document.getElementById('resetBtn').onclick = ()=>resetGame(false);
        document.querySelectorAll('.scene-btn').forEach(b => b.onclick = ()=>switchScene(b.dataset.scene));
    }

    function init() {
        bindEvents();
        if (!localStorage.getItem('xiuxian_v7')) { startNewGame(); }
        else { loadGame(); }
        switchScene('cave');
    }
    init();
})();
</script>
</body>
</html>
